<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

  <title>Frontend Mentor | Ping coming soon page</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->

</head>
<body>

  <div class="container">
    <header>
      <div class="logo">
        <img src="./images/logo.svg" alt="ping logo">
      </div>
    </header>

    <main>
      <h1>We are launching <strong>soon!</strong></h1>
      
      <p>Subscribe and get notified</p>

      <form action="#">
        <!-- <label for="email" aria-label>Email Address</label> -->
        <input type="email" id="email" placeholder="Your email address...">
        <!-- <div class="error-msg"></div> -->
        <button>Notify Me</button>
      </form>

      <div>
        <img src="./images/illustration-dashboard.png">
      </div>

    </main>

    <footer>
      <div class="social-links"></div>
      <p class="copyright-declarion">&copy; Copyright Ping. All rights reserved.</p>
    </footer>
  </div>

  <script src="app.js"></script>

</html>
